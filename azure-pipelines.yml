trigger:
- main

pool:
  name: MSP

steps:
- task: UseDotNet@2
  inputs:
    version: '8.x'

- script: dotnet restore
  displayName: Restore

- script: dotnet build --configuration Release
  displayName: Build

- script: dotnet pack StringExtensions.Library/StringExtensions.Library.csproj -c Release -o $(Build.ArtifactStagingDirectory)
  displayName: Pack

- task: NuGetAuthenticate@1

- task: NuGetCommand@2
  inputs:
    command: push
    packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
    nuGetFeedType: internal
    publishVstsFeed: stringextensions-feed
